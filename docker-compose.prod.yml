version: "3.9"

services:
  app:
    image: ${IMAGE_NAME}
    container_name: brscience-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "${APP_PORT}:3000"
    networks:
      - brscience-network

  mysql:
    image: mysql:8.0
    container_name: brscience-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    networks:
      - brscience-network

volumes:
  mysql_data:

networks:
  brscience-network:
    driver: bridge